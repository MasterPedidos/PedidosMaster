<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- Modo APP / Fullscreen -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">

<!-- Garante modo claro -->
<meta name="color-scheme" content="light only">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="300x300" href="icones/icone-192.png">
<link rel="apple-touch-icon" href="icones/icone-192.png">

<title>Pedidos OnLine</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#ffffff !important;
  font-family: Arial, sans-serif;
  text-align:center;
  overscroll-behavior-y:none;
}

/* Fundo branco em todas as telas */
:root { color-scheme: light !important; }
#tela-marcas, #tela-produtos, #tela-carrinho {
  background:#ffffff !important;
  color:#000000 !important;
}

/* Splash */
#splash {
  position: fixed;
  inset: 0;
  background: #2b7bba;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity .3s ease;
}
#splash img { width: 180px; height: auto; }

/* Topo */
header {
  background:#2b7bba;
  color:white;
  padding:8px;
  font-size:17px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.titulo-topo { flex:1; text-align:center; line-height:1.2; }

.top-btn { background:white; color:#2b7bba; border:none; border-radius:8px; padding:7px 12px; font-size:15px; font-weight:bold; cursor:pointer; }
.top-btn.enviar { background:#25d366; color:white; }

/* Produtos */
#produtos-container { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:12px; max-width:700px; margin:auto; }
.produto { background:white; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); padding:10px; }
.produto img { width:100%; height:160px; object-fit:contain; border-radius:10px; background:#fff; }

/* Quantidade */
.qtd-container { display:flex; align-items:center; justify-content:center; margin-top:5px; }
.qtd-container button { width:28px; height:28px; border:none; border-radius:6px; background:#2b7bba; color:white; font-size:18px; font-weight:bold; cursor:pointer; }
.qtd-container input { width:40px; text-align:center; margin:0 5px; border:1px solid #ccc; border-radius:6px; }

/* Carrinho */
#tela-carrinho { padding:15px; }
.carrinho-item { background:white; border-radius:10px; margin:8px auto; padding:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); max-width:700px; display:flex; justify-content:space-between; align-items:center; }

/* Popup */
.hidden { display:none; }
#popup { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:100; }
#popup-content { background:white; padding:20px; border-radius:10px; max-width:300px; text-align:center; }

</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <img src="ativos/logo.svg" alt="Master Distribuidora">
</div>

<header>
  <button id="voltar" onclick="mostrarMarcas()" class="top-btn">🔙 Marcas</button>
  <div class="titulo-topo">Pedidos OnLine<br><span id="total">Total: R$ 0,00</span></div>
  <button id="btnCarrinho" onclick="mostrarCarrinho()" class="top-btn">🛒 <span id="cart-count">0</span></button>
  <button id="btnEnviarPedido" onclick="enviarWhatsApp()" class="top-btn enviar" style="display:none;">📩 Enviar</button>
</header>

<div id="tela-marcas">
  <div id="telefone-container"></div>
  <h3>Escolha uma Marca</h3>
  <button id="btnRecuperar" style="display:none; margin-bottom:10px; background:#ffcc00; color:#000; padding:8px 14px; border-radius:8px; border:none; font-weight:bold;" onclick="recuperarPedido()">🕘 Recuperar último pedido</button>

  <div id="marcas-container">
    <button class="marca-btn tudo" onclick="mostrarProdutos('Tudo')">Tudo</button>
    <button class="marca-btn" onclick="mostrarProdutos('Danone')">Danone</button>
    <button class="marca-btn" onclick="mostrarProdutos('Sacola')">Sacolas</button>
  </div>
</div>

<div id="popup">
  <div id="popup-content">
    <h4>Informe seu número de contato</h4>
    <input id="telefone-input" placeholder="(19) 99999-9999" maxlength="15">
    <button id="btnSalvarContato">Salvar contato</button>
  </div>
</div>

<div id="tela-produtos" class="hidden">
  <h3 id="titulo-marca"></h3>
  <div id="produtos-container"></div>
</div>

<div id="tela-carrinho" class="hidden">
  <h3>🛒 Meu Carrinho</h3>
  <div id="itens-carrinho"></div>
  <h3 id="total-carrinho">Total: R$ 0,00</h3>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    const sp = document.getElementById("splash");
    sp.style.opacity = "0";
    setTimeout(() => sp.style.display = "none", 300);
  }, 500);
});
</script>

<script src="app.js"></script>

</body>
</html>
