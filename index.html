<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="192x192" href="ícones/ícone-192.png">
<link rel="apple-touch-icon" href="ícones/ícone-192.png">
<meta name="theme-color" content="#2b7bba">

<title>Pedidos OnLine</title>

<style>
html, body {
  height: 100%;
  margin:0; padding:0;
  overflow-x:hidden;
  background:#f7f7f7;
  font-family: Arial, sans-serif;
  text-align:center;
}
@supports (-webkit-touch-callout: none) { body { height: -webkit-fill-available; } }

/* SPLASH */
#splash {
  position: fixed;
  inset: 0;
  background: #2b7bba;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#splash img { width: 180px; }

/* HEADER */
header {
  background:#2b7bba;
  color:white;
  padding:8px;
  font-size:17px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.titulo-topo { flex:1; text-align:center; line-height:1.2; }
#total { font-size:14px; font-weight:normal; }

.top-btn {
  background:white;
  color:#2b7bba;
  border:none;
  border-radius:8px;
  padding:7px 12px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}
.top-btn.enviar { background:#25d366; color:white; }
#btnEnviarPedido { display:none; }

/* MARCAS */
#marcas-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:10px;
}
.marca-btn {
  flex: 1 1 120px;
  min-width: 130px;
  max-width: 160px;
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:14px;
  background:#2b7bba;
  color:white;
  cursor:pointer;
}
.marca-btn.tudo {
  background:#25d366;
  font-weight:bold;
}

/* PRODUTOS */
#produtos-container {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
  max-width:700px;
  margin:auto;
}
.produto {
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.produto img {
  width:100%;
  height:160px;
  object-fit:contain;
  background:white;
  border-radius:10px;
}

/* INFO */
.linha-info {
  display:flex;
  justify-content:space-between;
  margin-top:4px;
  font-size:15px;
  font-weight:bold;
  color:#111;
}
.preco-linha {
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:15px;
  font-weight:bold;
}

/* QTD */
.qtd-container {
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:6px;
}
.qtd-container button {
  width:28px; height:28px;
  background:#2b7bba;
  color:white;
  border:none; border-radius:6px;
  font-size:18px;
  cursor:pointer;
}
.qtd-container input {
  width:40px; text-align:center;
  margin:0 5px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* CARRINHO */
#tela-carrinho { padding:15px; }
.carrinho-item {
  background:white;
  border-radius:10px;
  margin:8px auto;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  max-width:700px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.carrinho-item img {
  width:60px; height:60px;
  object-fit:contain;
  background:white;
  padding:4px;
  border-radius:8px;
}

/* POPUP TELEFONE */
#popup {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}
#popup-content {
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:300px;
}
#popup input {
  width:90%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:6px;
}
.hidden{display:none;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="ativos/logo.svg" alt="Master Distribuidora">
</div>

<header>
  <button id="voltar" onclick="mostrarMarcas()" class="top-btn">🏷️ Marcas</button>

  <div class="titulo-topo">
    Pedidos OnLine<br>
    <span id="total">Total: R$ 0,00</span>
  </div>

  <button id="btnCarrinho" onclick="mostrarCarrinho()" class="top-btn">
    🛒 <span id="cart-count">0</span>
  </button>

  <button id="btnEnviarPedido" onclick="enviarWhatsApp()" class="top-btn enviar">
    📦 Enviar
  </button>
</header>

<!-- CONTATO -->
<div id="popup">
  <div id="popup-content">
    <h4>Informe seu número de contato</h4>
    <input id="telefone-input" placeholder="(19) 99999-9999" maxlength="15">
    <button id="btnSalvarContato">Salvar contato</button>
  </div>
</div>

<!-- TELA 1 -->
<div id="tela-marcas">
  <h3>Escolha uma Marca</h3>
  <div id="telefone-container"></div>

  <button id="btnRecuperar" style="display:none"
          onclick="recuperarPedido()">♻️ Recuperar último pedido</button>

  <div id="marcas-container">
    <button class="marca-btn tudo" onclick="mostrarProdutos('Tudo')">Tudo</button>
    <button class="marca-btn" onclick="mostrarProdutos('Bauducco')">Bauducco</button>
    <button class="marca-btn" onclick="mostrarProdutos('Danone')">Danone</button>
    <button class="marca-btn" onclick="mostrarProdutos('Divinitos')">Divinitos</button>
    <button class="marca-btn" onclick="mostrarProdutos('Elma Chips')">Elma Chips</button>
    <button class="marca-btn" onclick="mostrarProdutos('FRITOP')">FRITOP</button>
    <button class="marca-btn" onclick="mostrarProdutos('Frutap')">Frutap</button>
    <button class="marca-btn" onclick="mostrarProdutos('Kremoso')">Kremoso</button>
    <button class="marca-btn" onclick="mostrarProdutos('Nestlé')">Nestlé</button>
    <button class="marca-btn" onclick="mostrarProdutos('Oz')">Oz Pipocas</button>
    <button class="marca-btn" onclick="mostrarProdutos('Rebeka')">Rebeka Pudim</button>
    <button class="marca-btn" onclick="mostrarProdutos('Rei da Massa')">Rei da Massa</button>
    <button class="marca-btn" onclick="mostrarProdutos('Sacola')">Sacolas</button>
  </div>
</div>

<!-- TELA 2 -->
<div id="tela-produtos" class="hidden">
  <h3 id="titulo-marca"></h3>
  <div id="produtos-container"></div>
</div>

<!-- TELA 3 -->
<div id="tela-carrinho" class="hidden">
  <h3>Meu Carrinho</h3>
  <div id="itens-carrinho"></div>
  <h3 id="total-carrinho">Total: R$ 0,00</h3>
</div>

<script>
/* SPLASH */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 400);
});

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* CARREGAR PRODUTOS */
let produtos = [];
fetch("produtos.json")
  .then(r => r.json())
  .then(d => produtos = d);

/* ESTADO */
let carrinho = {};
let telefoneDigits = localStorage.getItem("telefone_digits") || "";
let telefoneDisplay = localStorage.getItem("telefone_display") || "";

/* TELEFONE */
function abrirPopup(){ document.getElementById("popup").style.display="flex"; }
function fecharPopup(){ document.getElementById("popup").style.display="none"; }

document.getElementById("btnSalvarContato").onclick = () => {
  const input = document.getElementById("telefone-input");
  let digits = input.value.replace(/\D/g,"");

  if(digits.length < 10){ alert("Número inválido."); return; }

  let ddd = digits.slice(0,2);
  let corpo = digits.slice(2);

  let exib = corpo.length === 8
    ? `(${ddd}) ${corpo.slice(0,4)}-${corpo.slice(4)}`
    : `(${ddd}) ${corpo.slice(0,5)}-${corpo.slice(5)}`;

  telefoneDigits = digits;
  telefoneDisplay = exib;

  localStorage.setItem("telefone_digits", digits);
  localStorage.setItem("telefone_display", exib);

  fecharPopup();
  renderTelefone();
};

function renderTelefone(){
  const div = document.getElementById("telefone-container");
  div.innerHTML = telefoneDigits
    ? `<span>📞 ${telefoneDisplay}</span> <button onclick="editarTelefone()">Editar</button>`
    : `<span style="color:#666;">Nenhum contato cadastrado</span>
       <button onclick="abrirPopup()">Cadastrar</button>`;
}
function editarTelefone(){
  localStorage.removeItem("telefone_digits");
  localStorage.removeItem("telefone_display");
  telefoneDigits = ""; telefoneDisplay = "";
  abrirPopup();
}
renderTelefone();
if(!telefoneDigits) abrirPopup();

/* MOSTRAR PRODUTOS */
function mostrarProdutos(m){
  document.getElementById("tela-marcas").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.add("hidden");
  document.getElementById("tela-produtos").classList.remove("hidden");
  document.getElementById("btnEnviarPedido").style.display="none";
  document.getElementById("btnCarrinho").style.display="inline-block";

  document.getElementById("titulo-marca").innerText =
    (m === "Tudo" ? "Todos os Produtos" : "Marca: " + m);

  const cont = document.getElementById("produtos-container");
  cont.innerHTML = "";

  produtos
    .filter(p => m === "Tudo" || p.marca === m)
    .forEach(p => {
      const un = p.unidades ? (Number(p.valor) / Number(p.unidades)) : null;
      const img = p.imagem && p.imagem.trim() !== ""
        ? p.imagem
        : "https://i.imgur.com/jzjHhHG.png";

      cont.innerHTML += `
        <div class="produto">
          <img src="${img}">
          <h4>${p.descricao}</h4>

          <div class="linha-info">
            <span>(Cod ${p.Código})</span>
            <span>Cx c/ ${p.unidades || "?"} un.</span>
          </div>

          <div class="preco-linha">
            <span>R$ ${un ? un.toFixed(2) : "—"}</span>
            <span>Cx R$ ${Number(p.valor).toFixed(2)}</span>
          </div>

          <div class="qtd-container">
            <button onclick="alterarQtd('${p.Código}', -1)">-</button>
            <input id="qtd-${p.Código}" value="${carrinho[p.Código]?.qtd || 0}">
            <button onclick="alterarQtd('${p.Código}', 1)">+</button>
          </div>
        </div>`;
    });
}

/* ALTERAR QTD */
function alterarQtd(cod, delta){
  const prod = produtos.find(p => p.Código == cod);
  if(!prod) return;

  prod.valor = Number(prod.valor);

  let qtd = (carrinho[cod]?.qtd || 0) + delta;
  if(qtd < 0) qtd = 0;

  if(qtd > 0) carrinho[cod] = {...prod, qtd};
  else delete carrinho[cod];

  const i1 = document.getElementById(`qtd-${cod}`);
  const i2 = document.getElementById(`qtd-carrinho-${cod}`);
  if(i1) i1.value = qtd;
  if(i2) i2.value = qtd;

  atualizarTotal();
}

/* MOSTRAR MARCAS */
function mostrarMarcas(){
  document.getElementById("tela-produtos").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.add("hidden");
  document.getElementById("tela-marcas").classList.remove("hidden");
  document.getElementById("btnEnviarPedido").style.display="none";
  document.getElementById("btnCarrinho").style.display="inline-block";
}

/* MOSTRAR CARRINHO */
function mostrarCarrinho(){
  document.getElementById("tela-marcas").classList.add("hidden");
  document.getElementById("tela-produtos").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.remove("hidden");

  document.getElementById("btnCarrinho").style.display="none";
  document.getElementById("btnEnviarPedido").style.display="inline-block";

  const cont = document.getElementById("itens-carrinho");
  cont.innerHTML = "";

  if(Object.keys(carrinho).length === 0){
    cont.innerHTML = "<p>Seu carrinho está vazio 🛒</p>";
    document.getElementById("total-carrinho").innerText = "Total: R$ 0,00";
    return;
  }

  for(let cod in carrinho){
    const p = carrinho[cod];
    cont.innerHTML += `
      <div class="carrinho-item">
        <img src="${p.imagem}">
        <div style="flex:1; text-align:left;">
          <b>${p.descricao}</b><br>
          <small>(${p.Código})</small><br>
          <span>R$ ${Number(p.valor).toFixed(2)}</span>
        </div>
        <div class="qtd-container">
          <button onclick="alterarQtd('${p.Código}', -1)">-</button>
          <input id="qtd-carrinho-${p.Código}" value="${p.qtd}">
          <button onclick="alterarQtd('${p.Código}', 1)">+</button>
        </div>
      </div>`;
  }

  atualizarTotal();
}

/* TOTAL */
function atualizarTotal(){
  let total = 0;
  let itens = 0;
  for(let c in carrinho){
    total += Number(carrinho[c].valor) * Number(carrinho[c].qtd);
    itens += Number(carrinho[c].qtd);
  }

  document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
  const tc = document.getElementById("total-carrinho");
  if(tc) tc.innerText = "Total: R$ " + total.toFixed(2);
  document.getElementById("cart-count").innerText = itens;
}

/* RECUPERAR PEDIDO */
function recuperarPedido(){
  const salvo = JSON.parse(localStorage.getItem("ultimo_pedido") || "{}");
  if(Object.keys(salvo).length === 0){
    alert("Nenhum pedido salvo.");
    return;
  }
  carrinho = salvo;
  atualizarTotal();
  mostrarCarrinho();
}

/* ENVIAR PEDIDO */
function enviarWhatsApp(){
  if(Object.keys(carrinho).length===0) return alert("Nenhum item no pedido!");

  localStorage.setItem("ultimo_pedido", JSON.stringify(carrinho));

  let msg = "🛍️ *Pedido:*%0A";
