<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- Modo APP / Fullscreen -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b7bba">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="192x192" href="icones/icone-192.png">
<link rel="apple-touch-icon" href="icones/icone-192.png">

<title>Pedidos OnLine</title>

<style>
html, body {
  height: 100%; margin:0; padding:0; overflow-x:hidden;
  background:#f7f7f7; font-family: Arial, sans-serif; text-align:center;
}
@supports (-webkit-touch-callout: none) { body { height: -webkit-fill-available; } }

/* TOPO CENTRALIZADO */
header {
  background:#2b7bba; color:white; padding:10px;
  font-size:18px; font-weight:bold; position:sticky; top:0; z-index:10;
  display:flex; justify-content:center; align-items:center; gap:15px;
}
header > * { flex: none; }

.logo-wrap img { height:55px; width:auto; }
#versao { background:#ffcc00; color:#000; padding:4px 8px; border-radius:6px; font-size:12px; }

#btnCarrinho, #btnEnviarPedido, #voltar {
  border:none; border-radius:8px; padding:7px 10px; cursor:pointer; font-size:14px;
}
#voltar { background:#e74c3c; color:white; }
#btnCarrinho { background:white; color:#2b7bba; border:2px solid #fff; }
#btnEnviarPedido { background:#25d366; color:white; display:none; }

/* Marcas */
#marcas-container {display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:10px;}
.marca-btn { padding:10px; background:#2b7bba; color:white; border:none; border-radius:10px; cursor:pointer; }
.marca-btn.tudo { background:#25d366; }

/* Popup telefone */
.hidden {display:none;}
#popup { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; }
#popup-content { background:white; padding:20px; border-radius:10px; width:260px; }

/* Produtos */
#produtos-container { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:12px; max-width:700px; margin:auto; }
.produto { background:white; border-radius:12px; padding:10px; box-shadow:0 2px 5px rgba(0,0,0,.15); }
.produto img { width:100%; height:160px; object-fit:contain; }

/* Carrinho */
.carrinho-item { background:white; padding:10px; margin:8px auto; border-radius:10px; max-width:700px; display:flex; justify-content:space-between; }

/* Splash */
#splash { position:fixed; inset:0; background:#2b7bba; display:flex; justify-content:center; align-items:center; z-index:9999; }
#splash img { width:180px; }
</style>
</head>
<body>

<div id="splash"><img src="ativos/logo.svg"></div>

<header>
  <button id="voltar" onclick="mostrarMarcas()">←</button>
  <div class="logo-wrap"><img src="ativos/logo.svg"><span id="versao">v2.1</span></div>
  <div><span id="total">R$ 0,00</span></div>
  <button id="btnCarrinho" onclick="mostrarCarrinho()">🛒</button>
  <button id="btnEnviarPedido" onclick="enviarWhatsApp()">📩 Enviar</button>
</header>

<!-- MARCAS -->
<div id="tela-marcas">
  <div id="telefone-container"></div>
  <h3>Escolha uma Marca</h3>
  <div id="marcas-container"></div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popup-content">
    <h4>Seu WhatsApp</h4>
    <input id="telefone-input" maxlength="15" placeholder="(19) 99999-9999">
    <button onclick="salvarTelefone()">Salvar</button>
  </div>
</div>

<div id="tela-produtos" class="hidden">
  <h3 id="titulo-marca"></h3>
  <div id="produtos-container"></div>
</div>

<div id="tela-carrinho" class="hidden">
  <h3>Meu Carrinho</h3>
  <div id="itens-carrinho"></div>
  <h3 id="total-carrinho">Total: R$ 0,00</h3>
</div>

<script>
// SPLASH
window.onload = () => setTimeout(() => document.getElementById("splash").style.display="none", 500);

// SERVICE WORKER
if('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');

// PERGUNTAR INSTALAÇÃO
let installPrompt;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault();
  installPrompt = e;
  setTimeout(() => {
    if(confirm("Deseja instalar o APP na tela inicial?")) installPrompt.prompt();
  }, 1500);
});

// MARCAS
const marcas=["Tudo","Bauducco","Danone","Divinitos","Elma Chips","FRITOP","Frutap","Kremoso","Nestlé","Oz","Rebeka","Rei da Massa","Sacola"];
const divMarcas=document.getElementById("marcas-container");
marcas.forEach(m=>{
  const b=document.createElement("button");
  b.className="marca-btn"+(m==="Tudo"?" tudo":"");
  b.innerText=m;
  b.onclick=()=>mostrarProdutos(m);
  divMarcas.appendChild(b);
});

// PRODUTOS (sua lista permanece)
const produtos = [
 {"Código":"129","descricao":"Danette Chocol 360G","marca":"Danone","valor":82.56,"imagem":"https://imgur.com/CNshggM.png"},
 {"Código":"8972","descricao":"Sacola Verde 45X60 - 4 Kilo","marca":"Sacola","valor":48,"imagem":"https://imgur.com/QflkHjL.png"}
];

let carrinho={}, telefoneDigits=localStorage.getItem("telefone")||"";

// TELEFONE
function salvarTelefone(){
  let n=document.getElementById("telefone-input").value.replace(/\D/g,"");
  if(n.length<10) return alert("Número inválido");
  localStorage.setItem("telefone",n);
  document.getElementById("popup").style.display="none";
  renderTel();
}
function renderTel(){
  document.getElementById("telefone-container").innerHTML = telefoneDigits
  ? `<b>${formatar(telefoneDigits)}</b> <button onclick="limparTel()">Editar</button>`
  : `<button onclick="document.getElementById('popup').style.display='flex'">Cadastrar Contato</button>`;
}
function formatar(v){return `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;}
function limparTel(){localStorage.removeItem("telefone"); telefoneDigits=""; renderTel();}
renderTel();

// TELAS + CARRINHO (mesmo funcionamento)
function mostrarProdutos(m){
  document.getElementById("tela-marcas").classList.add("hidden");
  document.getElementById("tela-produtos").classList.remove("hidden");
  document.getElementById("titulo-marca").innerText = m==="Tudo"?"Todos os Produtos":m;

  let div=document.getElementById("produtos-container");
  div.innerHTML="";
  produtos.filter(p=>m==="Tudo"||p.marca===m).forEach(p=>{
    div.innerHTML+=`<div class="produto"><img src="${p.imagem}"><h4>${p.descricao}</h4><b>R$ ${p.valor.toFixed(2)}</b><br><button onclick="add('${p.Código}')">Adicionar</button></div>`;
  });
}
function add(c){
  let p=produtos.find(x=>x.Código==c);
  carrinho[c]=(carrinho[c]||{...p, qtd:0});
  carrinho[c].qtd++;
  atualizar();
}
function mostrarCarrinho(){
  document.getElementById("tela-marcas").classList.add("hidden");
  document.getElementById("tela-produtos").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.remove("hidden");
  atualizar();
}
function mostrarMarcas(){
  document.getElementById("tela-produtos").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.add("hidden");
  document.getElementById("tela-marcas").classList.remove("hidden");
}
function atualizar(){
  let html="",total=0;
  for(let c in carrinho){
    let p=carrinho[c];
    total+=p.valor*p.qtd;
    html+=`<div class="carrinho-item">${p.descricao} (x${p.qtd}) - R$ ${(p.valor*p.qtd).toFixed(2)}</div>`;
  }
  document.getElementById("itens-carrinho").innerHTML=html||"<p>Vazio</p>";
  document.getElementById("total").innerText="R$ "+total.toFixed(2);
  document.getElementById("total-carrinho").innerText="R$ "+total.toFixed(2);
}
function enviarWhatsApp(){
  if(!telefoneDigits) return alert("Cadastre o telefone!");
  let msg="Pedido:%0A"; for(let c in carrinho){let p=carrinho[c]; msg+=`${p.descricao} x${p.qtd}%0A`;}
  msg+=`Total: ${document.getElementById("total").innerText}`;
  window.open("https://wa.me/5519992394899?text="+msg);
}
</script>
</body>
</html>
