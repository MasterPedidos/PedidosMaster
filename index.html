let carrinho = {},
    telefoneDigits = localStorage.getItem("telefone_digits")||"",
    telefoneDisplay = localStorage.getItem("telefone_display")||"";

// Máscara telefone
document.addEventListener("input", e=>{
  if(e.target.id==="telefone-input"){
    let v=e.target.value.replace(/\D/g,"");
    if(v.length>11)v=v.slice(0,11);
    if(v.length>=7)e.target.value=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if(v.length>2)e.target.value=`(${v.slice(0,2)}) ${v.slice(2)}`;
    else e.target.value=v;
  }
});

function renderTelefone(){
  const el=document.getElementById("telefone-container");
  el.innerHTML = telefoneDigits
    ? `<span>${telefoneDisplay}</span><button onclick="editarTelefone()">?? Editar</button>`
    : `<span style="color:#666;">Nenhum contato cadastrado</span> <button onclick="abrirPopup()">Cadastrar</button>`;
}
function abrirPopup(){document.getElementById("popup").style.display="flex";}
function fecharPopup(){document.getElementById("popup").style.display="none";}
function salvarTelefone(){
  const inp=document.getElementById("telefone-input");
  const digits=inp.value.replace(/\D/g,"");
  if(digits.length<10) return alert("Número inválido! Use DDD + celular.");
  const ddd=digits.slice(0,2), corpo=digits.slice(2);
  const exib=corpo.length===8?`(${ddd}) ${corpo.slice(0,4)}-${corpo.slice(4)}`:`(${ddd}) ${corpo.slice(0,5)}-${corpo.slice(5)}`;
  telefoneDigits=digits; telefoneDisplay=exib;
  localStorage.setItem("telefone_digits", telefoneDigits);
  localStorage.setItem("telefone_display", telefoneDisplay);
  fecharPopup(); renderTelefone();
}
function editarTelefone(){
  localStorage.removeItem("telefone_digits");
  localStorage.removeItem("telefone_display");
  telefoneDigits=""; telefoneDisplay="";
  abrirPopup();
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("btnSalvarContato").addEventListener("click", salvarTelefone);
  renderTelefone();
  if(!telefoneDigits) abrirPopup();
});

// Telas
function mostrarProdutos(marca){
  document.getElementById("tela-marcas").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.add("hidden");
  document.getElementById("tela-produtos").classList.remove("hidden");
  document.getElementById("btnCarrinho").style.display="inline-block";
  document.getElementById("btnEnviarPedido").style.display="none";

  document.getElementById("titulo-marca").textContent = (marca==="Tudo"?"Todos os Produtos":"Marca: "+marca);

  const container=document.getElementById("produtos-container");
  container.innerHTML="";
  produtos
    .filter(p=>marca==="Tudo"||p.marca===marca)
    .forEach(prod=>{
      const imgSrc = (prod.imagem && prod.imagem.trim()!=="") ? prod.imagem : "https://i.imgur.com/jzjHhHG.png";
      container.innerHTML += `
        <div class="produto">
          <img src="${imgSrc}" alt="${prod.descricao}" loading="lazy" decoding="async">
          <h4>${prod.descricao}</h4>
          <small>(${prod.Código})</small>
          <p><b>R$ ${prod.valor.toFixed(2)}</b></p>
          <div class="qtd-container">
            <button onclick="alterarQtd('${prod.Código}', -1)">-</button>
            <input id="qtd-${prod.Código}" value="${carrinho[prod.Código]?.qtd||0}">
            <button onclick="alterarQtd('${prod.Código}', 1)">+</button>
          </div>
        </div>`;
    });
}

function mostrarMarcas(){
  document.getElementById("tela-produtos").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.add("hidden");
  document.getElementById("tela-marcas").classList.remove("hidden");
  document.getElementById("btnCarrinho").style.display="inline-block";
  document.getElementById("btnEnviarPedido").style.display="none";
}

function mostrarCarrinho(){
  document.getElementById("tela-marcas").classList.add("hidden");
  document.getElementById("tela-produtos").classList.add("hidden");
  document.getElementById("tela-carrinho").classList.remove("hidden");
  document.getElementById("btnCarrinho").style.display="none";
  document.getElementById("btnEnviarPedido").style.display="inline-block";

  const container=document.getElementById("itens-carrinho");
  container.innerHTML="";
  if(Object.keys(carrinho).length===0){
    container.innerHTML="<p>Seu carrinho está vazio ??</p>";
    document.getElementById("total-carrinho").textContent="Total: R$ 0,00";
    return;
  }
  for (let c in carrinho){
    const p=carrinho[c];
    container.innerHTML += `
      <div class="carrinho-item">
        <img src="${p.imagem}" alt="${p.descricao}">
        <div style="flex:1; text-align:left;">
          <b>${p.descricao}</b><br>
          <small>(${p.Código})</small><br>
          <span>R$ ${p.valor.toFixed(2)}</span>
        </div>
        <div class="qtd-container">
          <button onclick="alterarQtd('${p.Código}', -1, true)">-</button>
          <input id="qtd-carrinho-${p.Código}" value="${p.qtd}">
          <button onclick="alterarQtd('${p.Código}', 1, true)">+</button>
        </div>
      </div>`;
  }
  atualizarTotal();
}

function alterarQtd(codigo, delta, dentroCarrinho=false){
  const prod=produtos.find(p=>p.Código===codigo);
  if(!prod) return;

  const qtdAtual=carrinho[codigo]?.qtd||0;
  let novaQtd=qtdAtual+delta;
  if(novaQtd<0) novaQtd=0;

  if(novaQtd>0) carrinho[codigo]={...prod, qtd:novaQtd};
  else delete carrinho[codigo];

  const i1=document.getElementById(`qtd-${codigo}`);
  const i2=document.getElementById(`qtd-carrinho-${codigo}`);
  if(i1) i1.value=novaQtd;
  if(i2) i2.value=novaQtd;

  atualizarTotal();
}

function atualizarTotal(){
  let total=0;
  for(let c in carrinho) total += carrinho[c].valor * carrinho[c].qtd;

  document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
  const t=document.getElementById("total-carrinho");
  if(t) t.innerText = "Total: R$ " + total.toFixed(2);
}

function enviarWhatsApp(){
  if(Object.keys(carrinho).length===0) return alert("Nenhum item no pedido!");
  let msg="?? *Pedido:*%0A";
  for(let c in carrinho){
    const p=carrinho[c];
    msg += `• ${p.descricao} (${p.Código}) - ${p.qtd} un.%0A`;
  }
  const total = Object.values(carrinho).reduce((a,b)=>a + b.valor*b.qtd, 0);
  msg += `%0A?? *Total:* R$ ${total.toFixed(2)}`;
  if(telefoneDisplay) msg += `%0A?? *Contato:* ${telefoneDisplay}`;

  // Altere o número abaixo se quiser
  window.open("https://wa.me/5519992394899?text=" + msg, "_blank");
}
