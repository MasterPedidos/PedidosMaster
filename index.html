<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- MODO APP / FULLSCREEN -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b7bba">

<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="192x192" href="icones/icone-192.png">
<link rel="apple-touch-icon" href="icones/icone-192.png">

<title>Pedidos OnLine</title>

<style>
html, body {height:100%; margin:0; padding:0; background:#f7f7f7; font-family:Arial; text-align:center; overflow-x:hidden;}
@supports (-webkit-touch-callout:none){body{height:-webkit-fill-available;}}

/* HEADER CORRIGIDO E CENTRALIZADO ✅ */
header{
  background:#2b7bba; color:white; padding:10px;
  font-size:18px; font-weight:bold; position:sticky; top:0; z-index:10;
  display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:12px; text-align:center;
}
.logo-wrap{display:flex; align-items:center; gap:8px;}
.logo-wrap img{height:65px; width:auto;}
#versao{background:#ffcc00; color:#000; padding:4px 8px; border-radius:8px; font-size:14px; border:1px solid #000;}
#total{font-weight:bold;}

#marcas-container{display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:10px;}
.marca-btn{min-width:115px; padding:10px; border:none; border-radius:10px; background:#2b7bba; color:white; cursor:pointer;}
.marca-btn.tudo{background:#25d366;}

#produtos-container{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:12px; max-width:700px; margin:auto;}
.produto{background:white; padding:10px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.produto img{width:100%; height:160px; object-fit:contain;}

.qtd-container{display:flex; justify-content:center; align-items:center; gap:5px;}
.qtd-container button{width:28px; height:28px; background:#2b7bba; border:none; color:white; border-radius:6px; font-size:18px; cursor:pointer;}
.qtd-container input{width:38px; text-align:center;}

button#voltar{background:#e74c3c; color:white; padding:8px 12px; border:none; border-radius:8px; cursor:pointer;}
#btnCarrinho,#btnEnviarPedido{padding:8px 14px; border-radius:10px; border:2px solid #fff; background:white; color:#2b7bba; font-weight:bold;}
#btnEnviarPedido{background:#25d366; color:white; border:none; display:none;}

#tela-carrinho{padding:15px;}
.carrinho-item{background:white; border-radius:10px; padding:10px; margin:10px auto; display:flex; gap:10px; align-items:center; max-width:700px;}

#popup{position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; justify-content:center; align-items:center;}
#popup-content{background:white; padding:20px; border-radius:10px; width:260px;}

#splash{position:fixed; inset:0; background:#2b7bba; display:flex; justify-content:center; align-items:center; z-index:9999;}
#splash img{width:180px;}
.hidden{display:none;}
</style>
</head>
<body>

<div id="splash"><img src="ativos/logo.svg"></div>

<header>
  <div class="logo-wrap"><img src="ativos/logo.svg"><span id="versao">v2.2</span></div>
  <button id="voltar" onclick="mostrarMarcas()">🔙 Marcas</button>
  <div>Pedidos OnLine<br><span id="total">Total: R$ 0,00</span></div>
  <button id="btnCarrinho" onclick="mostrarCarrinho()">🛒 Carrinho</button>
  <button id="btnEnviarPedido" onclick="enviarWhatsApp()">📩 Enviar Pedido</button>
</header>

<div id="tela-marcas">
  <h3>Escolha uma Marca</h3>
  <div id="marcas-container">
    <button class="marca-btn tudo" onclick="mostrarProdutos('Tudo')">Tudo</button>
    <button class="marca-btn" onclick="mostrarProdutos('Danone')">Danone</button>
    <button class="marca-btn" onclick="mostrarProdutos('Frutap')">Frutap</button>
  </div>
</div>

<div id="tela-produtos" class="hidden">
  <h3 id="titulo-marca"></h3>
  <div id="produtos-container"></div>
</div>

<div id="tela-carrinho" class="hidden">
  <h3>🛍️ Meu Carrinho</h3>
  <div id="itens-carrinho"></div>
  <h3 id="total-carrinho">Total: R$ 0,00</h3>
</div>

<script>
// SPLASH
setTimeout(()=>{document.getElementById("splash").style.display="none";},600);

// DETECÇÃO PARA INSTALAR COMO APP ✅
let promptInstalar;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  promptInstalar=e;
  setTimeout(()=>{
    if(confirm("Deseja adicionar o app à tela inicial?")){
      promptInstalar.prompt();
    }
  }, 800);
});

// PRODUTOS TESTE ✅ (POUCOS)
const produtos=[
{"Código":"129","descricao":"Danette Chocolate","marca":"Danone","valor":82.56,"imagem":"https://imgur.com/CNshggM.png"},
{"Código":"64","descricao":"Danette Branco","marca":"Danone","valor":82.56,"imagem":"https://imgur.com/GCbUBfn.png"},
{"Código":"2494","descricao":"Torta Choc Frutap","marca":"Frutap","valor":30,"imagem":"https://imgur.com/5Sflomp.png"},
{"Código":"2490","descricao":"Grego Mor Frutap","marca":"Frutap","valor":39.6,"imagem":"https://imgur.com/am4vC84.png"},
{"Código":"300","descricao":"Pudim Rebeka","marca":"Frutap","valor":61.2,"imagem":"https://imgur.com/xSIQRUw.png"},
{"Código":"45","descricao":"Danoninho Morango","marca":"Danone","valor":118.8,"imagem":"https://imgur.com/D0pQUZg.png"}
];

let carrinho={};

function mostrarProdutos(m){
document.getElementById("tela-marcas").classList.add("hidden");
document.getElementById("tela-carrinho").classList.add("hidden");
document.getElementById("tela-produtos").classList.remove("hidden");

document.getElementById("titulo-marca").textContent = (m==="Tudo"?"Todos os Produtos":m);
const box=document.getElementById("produtos-container");
box.innerHTML="";

produtos.filter(p=>m==="Tudo"||p.marca===m).forEach(p=>{
box.innerHTML+=`
<div class="produto">
<img src="${p.imagem}">
<p><b>${p.descricao}</b><br>(${p.Código})<br>R$ ${p.valor.toFixed(2)}</p>
<div class="qtd-container">
<button onclick="alterarQtd('${p.Código}',-1)">-</button>
<input id="qtd-${p.Código}" value="${carrinho[p.Código]?.qtd||0}">
<button onclick="alterarQtd('${p.Código}',1)">+</button>
</div></div>`;
});
}

function mostrarMarcas(){
document.getElementById("tela-marcas").classList.remove("hidden");
document.getElementById("tela-produtos").classList.add("hidden");
document.getElementById("tela-carrinho").classList.add("hidden");
document.getElementById("btnEnviarPedido").style.display="none";
document.getElementById("btnCarrinho").style.display="inline-block";
}

function mostrarCarrinho(){
document.getElementById("tela-marcas").classList.add("hidden");
document.getElementById("tela-produtos").classList.add("hidden");
document.getElementById("tela-carrinho").classList.remove("hidden");
document.getElementById("btnCarrinho").style.display="none";
document.getElementById("btnEnviarPedido").style.display="inline-block";

const list=document.getElementById("itens-carrinho");
list.innerHTML="";
for(let c in carrinho){
const p=carrinho[c];
list.innerHTML+=`
<div class="carrinho-item">
<img src="${p.imagem}">
<div style="flex:1;text-align:left;">${p.descricao}<br>(${p.Código})<br>R$ ${p.valor.toFixed(2)}</div>
<div class="qtd-container">
<button onclick="alterarQtd('${p.Código}',-1,true)">-</button>
<input id="qtd-carrinho-${p.Código}" value="${p.qtd}">
<button onclick="alterarQtd('${p.Código}',1,true)">+</button>
</div></div>`;
}
atualizarTotal();
}

function alterarQtd(c,d,cart){
const p=produtos.find(x=>x.Código===c);
const q=(carrinho[c]?.qtd||0)+d;
if(q>0)carrinho[c]={...p,qtd:q};else delete carrinho[c];
document.getElementById(`qtd-${c}`)?.value=q||0;
document.getElementById(`qtd-carrinho-${c}`)?.value=q||0;
atualizarTotal();
}

function atualizarTotal(){
let t=0; for(let c in carrinho)t+=carrinho[c].valor*carrinho[c].qtd;
document.getElementById("total").innerText="Total: R$ "+t.toFixed(2);
document.getElementById("total-carrinho").innerText="Total: R$ "+t.toFixed(2);
}

function enviarWhatsApp(){
if(!Object.keys(carrinho).length)return alert("Nenhum item no carrinho!");
let msg="🛒 *Pedido:*%0A";
for(let c in carrinho){let p=carrinho[c]; msg+=`• ${p.descricao} (${p.Código}) - ${p.qtd} un.%0A`;}
let t=Object.values(carrinho).reduce((a,b)=>a+b.valor*b.qtd,0);
msg+=`%0A💰 Total: R$ ${t.toFixed(2)}`;
window.open("https://wa.me/5519992394899?text="+msg,"_blank");
}
</script>
</body>
</html>
