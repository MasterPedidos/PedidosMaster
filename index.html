<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b7bba">

<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="192x192" href="ícones/icone-192.png">
<link rel="apple-touch-icon" href="ícones/icone-192.png">

<title>Pedidos OnLine</title>

<style>
html, body {
  height: 100%; margin:0; padding:0; overflow-x:hidden;
  background:#f7f7f7; font-family: Arial, sans-serif;
}

/* SPLASH */
#splash {
  position:fixed; inset:0; background:#2b7bba;
  display:flex; justify-content:center; align-items:center;
  z-index:9999;
}
#splash img { width: 180px; }

/* TOPO */
header {
  background:#2b7bba; color:white; padding:10px;
  display:flex; justify-content:center; align-items:center; gap:15px;
}
.logo-wrap { display:flex; align-items:center; gap:10px; }
.logo-wrap img { height:48px; }

#versao { background:#ffcc00; color:#000; padding:4px 8px; border-radius:8px; }

#total { font-weight:bold; }

/* Botões do topo */
#voltar, #btnCarrinho, #btnEnviarPedido {
  background:white; color:#2b7bba; border:none; font-weight:bold;
  padding:6px 12px; border-radius:8px; cursor:pointer;
}
#voltar { background:#e74c3c; color:white; }
#btnEnviarPedido { background:#25d366; color:white; display:none; }

/* Marcas */
#marcas-container {
  display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:10px;
}
.marca-btn {
  min-width:125px; background:#2b7bba; color:white;
  border:none; border-radius:10px; padding:10px; cursor:pointer;
}
.marca-btn.tudo { background:#25d366; }

/* Produtos */
#produtos-container {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:12px; padding:12px; max-width:700px; margin:auto;
}
.produto {
  background:white; border-radius:12px; padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.15);
}
.produto img { width:100%; height:160px; object-fit:contain; }

/* Carrinho */
.hidden { display:none; }
</style>
</head>
<body>

<div id="splash"><img src="ativos/logo.svg"></div>

<header>
  <div class="logo-wrap">
    <img src="ativos/logo.svg">
    <span id="versao">v2.1</span>
  </div>
  <div>Pedidos OnLine<br><span id="total">Total: R$ 0,00</span></div>
  <button id="voltar" onclick="mostrarMarcas()">Marcas</button>
  <button id="btnCarrinho" onclick="mostrarCarrinho()">Carrinho</button>
  <button id="btnEnviarPedido" onclick="enviarWhatsApp()">Enviar</button>
</header>

<div id="tela-marcas">
  <h3>Escolha uma Marca</h3>
  <div id="marcas-container"></div>
</div>

<div id="tela-produtos" class="hidden">
  <h3 id="titulo-marca"></h3>
  <div id="produtos-container"></div>
</div>

<div id="tela-carrinho" class="hidden">
  <h3>Meu Carrinho</h3>
  <div id="itens-carrinho"></div>
  <h3 id="total-carrinho">Total: R$ 0,00</h3>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

window.addEventListener('load', () => {
  setTimeout(()=>{ document.getElementById('splash').style.display='none'; }, 600);
});
</script>

</body>
</html>
